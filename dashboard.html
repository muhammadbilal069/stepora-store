<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Stepora</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #0b0c10; /* Premium Dark Background */
            color: #fff;
            padding: 40px 5%;
            min-height: 100vh;
        }

        /* Dashboard Title */
        .dashboard-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .dashboard-header h1 {
            font-size: 36px;
            letter-spacing: 1px;
            color: #fff;
            text-transform: uppercase;
            font-weight: 800;
        }
        .dashboard-header span {
            color: #6a8d55; /* THEME RESTORED: Luxury Brand Green */
        }

        /* Container jo card aur table dono ko handle karega */
        .dashboard-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 50px;
        }

        /* Card Section (Form Container) */
        .dashboard-card {
            background: #11141a; 
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px; 
            margin: 0 auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            border: 1px solid rgba(106, 141, 85, 0.4); /* THEME RESTORED: Green Border */
            text-align: center;
        }

        .dashboard-card h2 {
            color: #fff;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid #2d343f;
            background: #1a1e26; 
            color: #fff;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #6a8d55; /* THEME RESTORED: Green Border Glow */
            box-shadow: 0 0 10px rgba(106, 141, 85, 0.2);
        }

        #addProduct {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #6a8d55; /* THEME RESTORED: Solid Green Button */
            color: #fff; 
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: 0.3s;
        }

        #addProduct:hover {
            background: #84af6d; /* Smooth Green Hover */
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(106, 141, 85, 0.4);
        }

        /* ===> CRUD TABLE STYLING <=== */
        .manage-products-section {
            width: 100%;
            background: #11141a;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .manage-products-section h3 {
            margin-bottom: 20px;
            font-size: 24px;
            color: #6a8d55; /* THEME RESTORED: Green Header */
            letter-spacing: 0.5px;
        }

        .table-responsive {
            overflow-x: auto;
        }

        .crud-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            text-align: left;
        }

        .crud-table th, .crud-table td {
            padding: 15px;
            border-bottom: 1px solid #2d343f;
        }

        .crud-table th {
            background-color: #1a1e26;
            color: #6a8d55; /* THEME RESTORED: Table Headers Green */
            font-weight: 600;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        .crud-table tr:hover {
            background-color: #161a22;
        }

        .crud-table img {
            border-radius: 8px;
            object-fit: cover;
        }

        .action-btns {
            display: flex;
            gap: 10px;
        }

        .btn-edit, .btn-delete {
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            color: #fff;
        }

        .btn-edit { background: #3a7bd5; }
        .btn-edit:hover { background: #00d2ff; } /* Keeping button action separate for clean UI */

        .btn-delete { background: #ff3838; }
        .btn-delete:hover { background: #d62828; }

        /* Responsive */
        @media(max-width:768px){
            .dashboard-card { width: 100%; padding: 30px 20px; }
            body { padding: 20px 3%; }
        }
    </style>
</head>
<body>

    <div class="dashboard-header">
        <h1>Admin<span> Panel</span></h1>
    </div>
    
    <div class="dashboard-wrapper">
        
        <form class="dashboard-card" id="productForm" onsubmit="return false;">
            <h2>Add New Product</h2>

            <div class="input-group">
                <input type="text" id="pname" placeholder="Product Name" required>
            </div>

            <div class="input-group">
                <input type="text" id="pdesc" placeholder="Description" required>
            </div>

            <div class="input-group">
                <input type="text" id="pimg" placeholder="Image URL" required>
            </div>

            <div class="input-group">
                <input type="number" id="pprice" placeholder="Price" required>
            </div>

            <button type="submit" id="addProduct">Add Product</button>
        </form>

        <div class="manage-products-section">
            <h3><i class="fa-solid fa-boxes-stacked"></i> Manage Store Products</h3>
            
            <div class="table-responsive">
                <table class="crud-table">
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Description</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="crud-table-body">
                        <!-- Dynamic items managed by dashboard.js -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script defer type="module" src="dashboard.js"></script>
     <script type="module" src="index.js"></script>

</body>
</html>
