<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Signup Lamp</title>
    <script defer src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        .signup-section {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow: hidden;
            transition: background 0.6s ease;
        }

        .signup-section.light-on {
            background: #0b0c10;
        }

        .lamp-base {
            position: absolute;
            top: 0;
            width: 120px;
            height: 25px;
            background: #222;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            z-index: 101;
            box-shadow: inset 0 -5px 10px rgba(0, 0, 0, 0.5);
        }

        .chain-wrapper {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            z-index: 100;
            padding: 10px;
        }

        .string {
            width: 3px;
            height: 150px;
            background: linear-gradient(#333, #888, #333);
            margin: 0 auto;
            transition: height 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .handle {
            width: 18px;
            height: 40px;
            background: #6a8d55;
            border-radius: 10px;
            margin: -5px auto 0;
            box-shadow: 0 0 15px rgba(106, 141, 85, 0.4);
        }

        .signup-card {
            margin-top: -150vh;
            /* margin-top: -1300px;  */
            /* width: 420px; */
            width: 90%;
            max-width: 420px;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            z-index: 10;
            opacity: 0;
            transition: all 0.9s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .signup-section.light-on .signup-card {
            margin-top: 120px;
            opacity: 1;
            background: #11141a;
            border: 1px solid rgba(106, 141, 85, 0.4);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7), 0 0 40px rgba(106, 141, 85, 0.15);
        }

        .lamp-glow {
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 255, 180, 0.2) 0%, transparent 70%);
            display: none;
            pointer-events: none;
        }

        .signup-section.light-on .lamp-glow {
            display: block;
        }

        .signup-card h2 {
            color: #fff;
            font-size: 26px;
            margin-bottom: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .signup-card p.subtitle {
            color: #666;
            font-size: 13px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: #888;
            font-size: 12px;
            margin-bottom: 6px;
            margin-left: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 13px 18px;
            background: #1a1e26;
            border: 1px solid #2d343f;
            border-radius: 12px;
            color: #fff;
            outline: none;
            transition: 0.3s ease;
        }

        .input-group input:focus {
            border-color: #6a8d55;
            background: #232933;
            box-shadow: 0 0 15px rgba(106, 141, 85, 0.1);
        }

        .signup-btn {
            width: 100%;
            padding: 15px;
            background: #6a8d55;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .signup-btn:hover {
            background: #84af6d;
            box-shadow: 0 0 30px rgba(106, 141, 85, 0.4);
            transform: translateY(-3px);
        }

        .footer-text {
            margin-top: 20px;
            font-size: 13px;
            color: #555;
        }

        .footer-text a {
            color: #6a8d55;
            text-decoration: none;
            font-weight: 600;
        }


        /* --- Responsive Media Queries --- */
        @media screen and (max-width: 480px) {
            .signup-card {
                padding: 45px 15px;
            }

            .signup-card h2 {
                font-size: 20px;
            }

            .lamp-base {
                width: 90px;
            }

            .string {
                height: 100px;
            }
        }

        /* Tablets (768px tak) */
        @media screen and (max-width: 768px) {
            .signup-section.light-on .signup-card {
                margin-top: 120px;
            }
        }

        @media screen and (max-height: 600px) {
            .string {
                height: 60px;
            }

            .signup-section.light-on .signup-card {
                margin-top: 20px;
                transform: scale(0.85);
            }
        }
    </style>
</head>

<body>

    <div class="signup-section" id="signupArea">
        <div class="lamp-base"></div>

        <div class="chain-wrapper" id="pull-chain">
            <div class="string" id="string"></div>
            <div class="handle"></div>
        </div>

        <div class="signup-card">
            <div class="lamp-glow"></div>
            <h2>Create <span>Account</span></h2>
            <p class="subtitle">Join our VIP community today</p>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="semail" placeholder="user@example.com" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="spasword" placeholder="••••••••" required>
            </div>

            <button class="signup-btn" id="signupBtn">Get Started</button>

            <p class="footer-text">
                Already a member? <a href="login.html">Login here</a>
            </p>
        </div>
    </div>

    <script defer type="module" src="signup.js"></script>
     <script type="module" src="index.js"></script>
</body>

</html>
