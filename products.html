    <style>
        /* Core Configurations */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f8fafc;
            color: #0f172a;
        }

        /* PRODUCTS GRID LAYOUT */
        .products {
            padding: 60px 0;
        }

        .products h2 {
            /* font-family: Georgia, 'Times New Roman', Times, serif; */
            text-align: center;
            font-size: 40px;
            font-weight: 900;
            margin-bottom: 50px;
            color: #1a1a1a;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .products h2::after {
            content: '';
            display: block;
            width: 80px;
            /* Thodi si length barhaye taake gradient khul ke dikhe */
            height: 4px;
            /* FIXED: Premium Luxury Green Gradient (Deep Forest to Vibrant Mint) */
            background: linear-gradient(90deg, #3d5a2d, #6a8d55, #9bc489);
            margin: 15px auto;
            border-radius: 2px;
        }

        .products-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 0 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* CARD STYLE */
        .product-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #f0f0f0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        /* /* .product-card p {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            /* Sirf 2 lines dikhayega */
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            /* Last mein ... dikhayega */
            height: auto;
            /* Ek fixed height taake saare cards barabar rahein */
            margin-bottom: 10px;
        /* }  */ 

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.12);
            border-color: #6a8d55;
        }

        .img-wrapper {
            width: 100%;
            height: 220px;
            overflow: hidden;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .product-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            transition: transform 0.5s ease;
        }

        .product-card:hover img {
            transform: scale(1.08);
        }

        .product-card h3 {
            font-size: 20px;
            font-weight: 700;
            color: #111;
            margin: 10px 0 5px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .product-card p {
            font-size: 14px;
            color: #666;
            line-height: 1.4;
            margin-bottom: 15px;
            height: 42px;
            overflow: hidden;
        }

        .product-card h4 {
            font-size: 22px;
            color: #6a8d55;
            font-weight: 800;
            margin-bottom: 15px;
        }

        /* VIP ADD TO CART BUTTON */
        .cart-btn {
            width: 100%;
            padding: 12px;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
            margin-top: auto;
        }

        .cart-btn i {
            font-size: 15px;
            transition: transform 0.3s ease;
        }

        .cart-btn:hover {
            background: #6a8d55;
            color: #fff;
            box-shadow: 0 5px 15px rgba(106, 141, 85, 0.4);
        }

        .cart-btn:hover i {
            transform: scale(1.2) rotate(-5deg);
        }

        /* CARD ANIMATION */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .product-card {
            animation: fadeIn 0.5s ease backwards;
        }

        /* RESPONSIVE LAYOUTS */
        @media (max-width: 1024px) {
            .products-container {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .products-container {
                grid-template-columns: repeat(2, 1fr);
            }

            .products h2 {
                font-size: 32px;
            }
        }

        @media (max-width: 480px) {
            .products-container {
                grid-template-columns: 1fr;
                padding: 0 20px;
            }
        }
    </style>
</head>
